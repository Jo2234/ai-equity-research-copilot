services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: equity-copilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-equity_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-equity_copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-equity_copilot_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-equity_copilot} -d ${POSTGRES_DB:-equity_copilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: equity-copilot-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      AIERC_DATA_DIR: /app/data
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-equity_copilot}:${POSTGRES_PASSWORD:-equity_copilot_local}@postgres:5432/${POSTGRES_DB:-equity_copilot}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
